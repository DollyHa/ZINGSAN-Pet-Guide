<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINGSAN | Smart Pet Tag Setup Guide</title>
    <style>
        :root {
            --primary: #2563eb;    /* ZINGSAN 科技蓝 */
            --success: #10b981;    /* 活力绿 */
            --bg: #f8fafc;
            --text: #1e293b;
            --dark: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.5;
        }

        /* 动态尺寸横幅 - 默认隐藏 */
        #size-banner {
            display: none;
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 10px 0;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 2px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--primary);
        }

        header {
            padding: 4rem 1rem;
            text-align: center;
            background: white;
            border-bottom: 2px solid var(--dark);
        }

        .brand-wrapper {
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        .logo-main {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -0.05rem;
            text-transform: uppercase;
            color: var(--dark);
            line-height: 0.9;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
        }

        .logo-sub {
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 0.65rem;
            text-transform: uppercase;
            color: var(--primary);
            margin-top: 0.4rem;
            padding-left: 0.3rem;
            display: block;
            border-top: 3px solid var(--dark);
            padding-top: 0.3rem;
        }

        h1 { margin: 1.5rem 0 0.5rem; font-size: 2.2rem; color: var(--dark); font-weight: 800; }
        .hero-desc { color: #64748b; font-size: 1.1rem
